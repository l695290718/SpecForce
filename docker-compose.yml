services:
  postgres:
    image: postgres:16-alpine
    container_name: specforge-postgres
    environment:
      POSTGRES_USER: specforge
      POSTGRES_PASSWORD: specforge
      POSTGRES_DB: specforge
    ports:
      - "5432:5432"
    volumes:
      - specforge_pgdata:/var/lib/postgresql/data

volumes:
  specforge_pgdata:
